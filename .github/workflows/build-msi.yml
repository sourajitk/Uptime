name: Build, Package, and Release MSI

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish Application (Release)
      run: dotnet publish UptimeTaskbarApp.csproj -c Release

    - name: Build MSI Setup Package (Release)
      run: dotnet build Setup/Setup.wixproj -c Release

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UptimeTaskbarAppSetup
        path: Setup/bin/x64/Release/UptimeTaskbarAppSetup.msi

    - name: Create and Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Setup/bin/x64/Release/UptimeTaskbarAppSetup.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
